{% extends "base.html" %}
{% block title %}All Indian States{% endblock %}

{% block content %}
<section class="states-page">
    <div class="container">
        <div class="section-header">
            <h1><i class="fas fa-map-marked-alt"></i> Browse by State</h1>
            <p>Explore properties across all 36 Indian states & union territories</p>
        </div>
        <div class="states-grid">
            {% for state in states %}
            <a href="{{ url_for('state_detail', state_name=state) }}" class="state-card">
                <div class="state-icon"><i class="fas fa-map-marker-alt"></i></div>
                <h3>{{ state }}</h3>
                <p>{{ state_counts.get(state, 0) }} properties</p>
                <span class="state-arrow"><i class="fas fa-arrow-right"></i></span>
            </a>
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}
