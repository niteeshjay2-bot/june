{% extends "base.html" %}
{% block title %}Server Error{% endblock %}

{% block content %}
<section class="error-page">
    <div class="container">
        <div class="error-content">
            <h1>500</h1>
            <h2>Something Went Wrong</h2>
            <p>Our servers are having a moment. Please try again in a bit!</p>
            <div class="error-actions">
                <a href="{{ url_for('home') }}" class="btn btn-primary"><i class="fas fa-home"></i> Go Home</a>
                <a href="{{ url_for('contact') }}" class="btn btn-outline"><i class="fas fa-envelope"></i> Contact Support</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
